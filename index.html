<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Agency</title>
    <link rel="icon" href="images/icon.png" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="section-2">
        <div class="container container-flex">
            <div class="section-2-text">
                <a href="#" class="badge"><img class="badge-img" src="images/section-2/blue-flower.png" alt="">
                    <span class="badge-text">Powering the Next Generation of Business Partnerships
                    </span>
                    </a>
                
                <div class="headline">
                    <h1 class="title">Connecting You to the Right Partners</h1>
                    <p class="subtitle">Unlock sustainable growth through tailored strategies that strengthen B2B relationships, enhance performance, and create lasting impact.</p>
                </div>
                <div class="section-2-btn">
                  <a href="#" class="btn btn-filled">Get a Free Quote</a>
                  <a href="#" class="btn btn-outline">Learn More</a>
                </div>
                   <img class="photo-mobile" width="294" height="294" src="images/section-2/Illustration.png" alt="illustration">

                <div class="additional-info">
                   <div class="additional-item">
                    <span class="total">150%</span>
                    <label class="label">Average Roi Increase</label>
                  </div>  
                  <div class="additional-item">
                    <span class="total">250+</span>
                    <label class="label">Successful Campaigns</label>
                  </div> 
                  <div class="additional-item">
                    <span class="total">100+</span>
                    <label class="label">Trusted Global Clients</label>
                  </div> 
                </div>
                </div>
                 <img class="photo-desctop" width="666" height="666" src="images/section-2/Illustration.png" alt="illustration">
            
        </div>
    </section>
    
</body>
</html>
