<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Agency</title>
    <link rel="icon" href="images/icon.png" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page__section10">
        <!-- Section 10 -->
        <section class="quote__section10" aria-labelledby="quote-title__section10">
            <div class="container__section10">
                <div class="quote__card__section10">
                    <div class="quote__grid__section10">
                        <div class="quote__content__section10">
                            <h2 class="quote__title__section10" id="quote-title__section10">
                                Time to Take Your B2B Growth to the Next Level?
                            </h2>
                            <p class="quote__subtitle__section10">
                                Let’s design a strategy tailored to your goals, built to strengthen your brand,
                                attract the right clients, and drive measurable growth.
                            </p>
                        </div>

                        <div class="quote__row__section10">
                            <div class="quote__form-wrap__section10">
                                <form class="quote__form__section10" action="#" method="post">
                                    <div class="field__section10">
                                        <label class="field__label__section10" for="name__section10">Name</label>
                                        <input class="field__control__section10" id="name__section10" name="name"
                                            type="text" autocomplete="name" placeholder="Name" required />
                                    </div>

                                    <div class="field__section10">
                                        <label class="field__label__section10" for="company__section10">Company</label>
                                        <input class="field__control__section10" id="company__section10" name="company"
                                            type="text" autocomplete="organization" placeholder="Company" />
                                    </div>

                                    <div class="field__section10">
                                        <label class="field__label__section10" for="email__section10">Email</label>
                                        <input class="field__control__section10" id="email__section10" name="email"
                                            type="email" autocomplete="email" placeholder="Email" required />
                                    </div>

                                    <div class="field__section10">
                                        <label class="field__label__section10" for="needs__section10">Project
                                            Needs</label>
                                        <textarea class="field__control__section10 field__control--textarea__section10"
                                            id="needs__section10" name="needs" placeholder="Project Needs"
                                            rows="3"></textarea>
                                    </div>

                                    <div class="quote__actions__section10">
                                        <button class="btn__section10 btn--accent__section10" type="submit">
                                            Request a Quote
                                        </button>
                                    </div>
                                </form>
                            </div>

                            <div class="quote__visual__section10" aria-hidden="true">
                                <div class="illustration__section10" role="presentation">
                                    <img class="illustration__img__section10" src="/img/Illustration.png" alt="" width="530"
                                        height="360" loading="lazy" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
